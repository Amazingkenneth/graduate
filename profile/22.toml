date = 2022-12-03
description = """你不会像其他男生那样吵吵闹闹，文文静静的，勤奋踏实，不骄不躁。可能是因为皮肤白和比较纤细的缘故，总是给人一种和你弱不禁风的错觉，但体育课上你总能很好地完成体能训练，记得那次全班一起做平板支撑，你竟是坚持到最后的两个人之中的一个！和你做同桌的时候，看到你上课时非常认真，下课也经常和周围同学讨论问题，学习态度认真，积极向上，希望你能越来越好！"""
