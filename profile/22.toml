date = 2022-12-03
description = """口罩下的你，总把实力深藏，九年级你变得好卷啊，教室里，总能看到你奋笔疾书的认真；体育课上，总能听闻你又把一大群同学甩在身后，凭借不凡的那样以冲进前列；谈笑中，总能想象到你被遮住的谦卑而温和的奇妙表情，常见你和黄森夕阳下跑道边捧着政治、历史资料，互考对方的快乐身影，每回看到都不由得心头一震：天啊，都这么拼搏的吗？Anyway，怀着敬佩，相信沉稳的你一定未来可期。"""
[[comment]]
from = 13
date = 2022-12-06
description = """我们班有一姓李的神人，长得跟普通人没啥区别，唯独脸上总挂着一样东西--口罩，因此我给它取名口罩李。口罩李对自己的口罩十分爱惜，除了吃饭，其余什么时候也不将其取下，我仔细观察过，口罩李早餐平均用时30秒，午餐和晚餐加起来用时不足4分钟，也就是说他一天中他只有5分钟是摘下口罩的，至于戴口罩的原因也有很多猜测，有的说他自疫情开始就习惯戴口罩，有的说他是为了遮住自己的绝世容颜，至今都没有统一的说法，但不可否认的是口罩李对他的口罩是真爱。要说口罩李最强悍的地方，那必须是他的体育，作为我们班最强体育生，他可以毫不费力地在800米，最后50米跑出4秒的成绩，还可以和我们说笑的同时持续做十几分钟的平板支撑，当然这一切都基于戴口罩之上，最让我惊叹的是他每次长跑时前面总是放水，直到最后200米才突然加速，将我们远远甩在身后，使我们叹为观止。"""