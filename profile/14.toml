date = 2022-12-03
description = """刘俊希，又高又帅，性格豪爽。他体育十分强，是国家二级运动员，游泳拿过许多奖项，而且跑步足球篮球都在行，他是我们班唯一一个能扣篮的人，他是计分表上的常客，有扣分也有加分。
