[[comment]]
from = 32
date = 2022-12-03
description = """你是一个阳光的大男孩，体育场上经常有你跃动着的身影，谈起篮球明星那根是如数家珍。知识面也很广，可以说是上知天文下知地理，学习成绩也不错，可以说是德智体美劳全面发展了，在高中，你一定会更加如鱼得水，加油吧。"""
[[comment]]
from = 11
date = 2022-12-04
description = """你为人乐观，热爱生活，开心快乐。每天放学在篮球场上都能看到你矫健的身影。你尊敬老师关心同学，热爱班级，科代表工作认真负责，学习上一丝不苟。你内心善良、天真无邪。在困难面前你也曾迷惘徘徊，甚至丧失了信心和方向，但我知道你没有屈服，你有一颗顽强上进的心，不会轻易放弃。你品行优良，待人诚恳，表里一致。宽厚仁道，不激进，不与人争锋，同学乐意亲近。你最突出的成果是学习逐步走向正轨，逐渐掌握了高中课程的学习方法。记得那次上数学课，老师出了一道关于边角关系的题目，一分钟未到，你便果断地举起了手，上讲台去，拿起粉笔刷刷点点，那些我们还尚未看懂的sin、cos、tan等函数就已解决了那道题。你现在一定要树立信心，没有翻不过的高山，没有越不过的大海，只要胸怀坚定，坚强果敢，乘风破浪会有时！"""
[[comment]]
from = 14
date = 2022-12-05
description = """夏钰喆，是我们班的篮球巨星。猴子捞月一个勾手直接进球。而且他很硬，根本顶不动。他投篮还贼准，盖都难盖。他跳绳也很行，双飞特别强，一分钟230个。他也是我们班的好人，十分热心肠，而且是个好朋友。他可是数学强者，在积分榜上是第二。他是大胃王，吃的是正常人的两倍，而且每次都坚持光盘行动，食堂里能做到这样的人少之又少。总而言之，能和他做朋友是让人愉快的。"""
[[comment]]
from = 18
date = 2022-12-06
description = """热爱打篮球，最喜欢的NBA球队是76ers。打篮球可以从一号位达到五号位，非常全能，做他的队友可以放心的把球传到他手上。为人和善，乐于帮助同学。不怎么打游戏（除了2K）。学习认真努力，有很多good ideas，学习成绩优异。"""