date = 2022-12-03
description = """你是一个积极阳光的男生，总是能看见你跟男生一起打闹。你总能语出惊人，希望你以后上课能忍住，因为高中老师也许直接把你拉去办公室。你真得很好笑，坐在你旁边听到你和别人的对话都忍俊不禁。上课憋笑很难，不要这么对高中同学。你挺负责的，总是按时收语文题目，虽然总是在我睡觉时叫我起来交。希望你未来能更好，将老师都没有的颜色保留住。"""
[[comment]]
from = 30
date = 2022-12-03
description = """作为班里的傻儿子，你总能给课堂增添乐趣，给班级带来欢笑,虽然平时看起来‘傻傻’的，但你的成绩却十分优异，学习也很认真。在数学课上，你总能破解出那些难题，下课时，你也经常和同学讨论问题。很高兴和你成为同学，希望你的成绩能越来越好！"""
[[comment]]
