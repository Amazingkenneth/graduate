description = """好一个凡尔赛老祖！真是低调做人高调做事啊！体育场上，你健步如飞，大放异彩，是我们班的骄傲。一副矫健的身躯，让你把无数金牌纳入囊中，拿到手软。聪慧的思维，让你的破题、解题无懈可击。无论是体育还是学习，你都有远超常人的潜力与能力。即使你藏得再深，也不能掩盖你的光芒。"""
