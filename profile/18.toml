date = 2022-12-03
description = """林家希，是个可回收“LJX”（垃圾箱），我们都叫他儿子。他语言文明有礼，时刻注意他人感受，在恰当的时候问候别人，以控制他人情绪，防止不必要的事情发生。他热爱打篮球，下雨天时都去打篮球。
事件：他曾与我和猴子投篮比赛，他连进六七个球秒杀全场。我卡在第一个点，猴子差一点追上儿子。
他编程能力很强，他曾组建开发一个项目，可惜创业未半而中道崩砠。他数学也很强，曾嘲讽我，“连巩固一都不会啊？”，还在一次赌做数学题中赢了我50块。"""