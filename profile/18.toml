date = 2022-12-03
description = """rap教父兼地主家的傻儿子风靡一班，无人不晓。论理科，计算速度飞宇不凡，解几何中善用面积。论体育，篮球有独家秘诀，一炸球，一过人，三步上篮，一气呵成，让人拍手称快，惊叹不已。有表面悠闲自在，且又有过人才能的气质，恐怕也只有地主家的“傻”儿子了吧。"""
