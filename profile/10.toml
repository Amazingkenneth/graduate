description = """“猪八戒照镜子——李瑷不是人”（有点合理但不多）哎呀真的是，随手一翻，怎么那么多你的表情包啊。不过这也挺好，以后翻回来回忆也能涌现出来。小学六年再加初中三年同学情，我们这（父与子）关系不必多赘述了吧。言归正传，你开朗阳光☀️的性格深深吸引了我。跟你聊天不需要注重用词啥的，你那小脑瓜里也兜着奇奇怪怪的东西，和你在一起整个人都轻松了许多。哦对了，上课一定要好好上哦（刚去上厕所了≠刚从床上爬起来）最后，接下来的日子我们携起手来一起奋斗好吗？（穿着蛇皮演出服神龙摆尾的下场～）"""
[[comment]]
from = 28
date = 2022-12-07
description = """李瑷作为一般的乐观小天使，不管遇到什么困难，她总是可以用笑声解决一切，乐观是他最强大的武器。她十分努力，做任何事情都是这样，上课、睡觉、以及上课睡觉。李瑷性格开朗，十分讨人喜欢，你不管对他有什么要求，只要他能满足，他基本都会满足你。不知道为什么，她在初三对酸角糕，尤其钟爱每天都有三角糕，据她所言，她的脚都有酸角糕的味道了，虽然酸角糕真的很好吃。李瑷就像一个小天使一样，在他身边你永远不会担心自己会伤心，因为她的笑声真的很魔性。她的身边绝对会跟着罗心懿，不管是去厕所，还是去厕所。希望李瑷继续加油，波波加油，波波加油(ง•̀_•́)ง。"""
[[comment]]
