description = """从地主家的傻儿子到希望之光，你一直是班级不可或缺的重要人物，不断为我们创造新梗，带来欢乐。不仅唱跳rap篮球样样精通，而且幽默也在线。有幸成为你的同学。因为你，我们的初中生活更加精彩"""
[[comment]]
