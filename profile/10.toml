date = 2022-12-07
description = """李瑷：是初中三年一直带给我们欢乐的人，不经意间流露出的幽默和吐槽自己遇到的那些倒霉的事总能让我们笑到肚子痛。不算是一个出众的美女但是凭着自己的人格魅力交到了许多好朋友。每天也很认真地写课程表，默默的为班级付出。学习十分认真遇到不会的就主动找老师、同学提问，这是我认为我只得向她学习的地方。当然，她的性格开朗，会积极参加班级的活动而且能够做得很好。掌握着各种八卦的班级开心果谁能不爱呢？"""